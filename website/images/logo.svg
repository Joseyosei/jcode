<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 110">
  <!-- Left hand -->
  <g fill="#2d7d32">
    <rect x="14" y="12" width="10" height="36" rx="5"/>
    <rect x="26" y="6"  width="10" height="42" rx="5"/>
    <rect x="38" y="9"  width="10" height="39" rx="5"/>
    <rect x="50" y="14" width="10" height="34" rx="5"/>
    <rect x="4"  y="34" width="16" height="10" rx="5" transform="rotate(-25 12 39)"/>
    <rect x="12" y="42" width="50" height="28" rx="10"/>
  </g>

  <!-- Right hand (mirrored) -->
  <g fill="#2d7d32" transform="translate(260,0) scale(-1,1)">
    <rect x="14" y="12" width="10" height="36" rx="5"/>
    <rect x="26" y="6"  width="10" height="42" rx="5"/>
    <rect x="38" y="9"  width="10" height="39" rx="5"/>
    <rect x="50" y="14" width="10" height="34" rx="5"/>
    <rect x="4"  y="34" width="16" height="10" rx="5" transform="rotate(-25 12 39)"/>
    <rect x="12" y="42" width="50" height="28" rx="10"/>
  </g>

  <!-- YOU BELONG text -->
  <text x="130" y="88" text-anchor="middle"
        font-family="Georgia, serif"
        font-weight="bold"
        font-size="22"
        letter-spacing="2"
        fill="#2d7d32">YOU BELONG</text>

  <!-- Small underline accent -->
  <line x1="80" y1="95" x2="180" y2="95" stroke="#66bb6a" stroke-width="2.5" stroke-linecap="round"/>
</svg>
